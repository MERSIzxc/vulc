<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 300px;
            padding: 15px;
            font-family: Arial, sans-serif;
        }
        h3 {
            margin: 0 0 15px 0;
            color: #667eea;
        }
        .status {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 10px;
        }
        button:hover {
            background: #5568d3;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .setup {
            display: none;
        }
        .setup.active {
            display: block;
        }
    </style>
</head>
<body>
    <h3>Vulcan Grade Tracker</h3>

    <div id="status"></div>

    <div id="main">
        <button id="parseBtn">Сохранить оценки</button>
        <button id="setupBtn">Настройки</button>
    </div>

    <div id="setup" class="setup">
        <p style="font-size: 12px; color: #666;">Введи URL сервера:</p>
        <input type="text" id="serverUrl" placeholder="https://your-app.railway.app">
        <p style="font-size: 12px; color: #666;">Введи свой API ключ с сайта:</p>
        <input type="text" id="apiKey" placeholder="API ключ">
        <button id="saveKeyBtn">Сохранить</button>
        <button id="backBtn">Назад</button>
    </div>

    <script src="popup.js"></script>
</body>
</html>
